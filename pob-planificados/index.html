<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POB Digital · Retiros Planificados</title>
<style>
  :root {
    --ocasa-ink:#1a2740; --ocasa-blue:#2563a8; --ocasa-cyan:#19b9c4; --ocasa-cyan-soft:#e6f7f8;
    --bg:#f4f6f9; --card:#fff; --line:#e4e9f0; --text:#1a2740; --muted:#6b7a90;
    --frozen:#3b6fd4; --frozen-bg:#eaf0fc; --refri:#14a7b3; --refri-bg:#e3f6f7;
    --shadow:0 1px 3px rgba(26,39,64,.06),0 4px 16px rgba(26,39,64,.04); --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  body{padding-bottom:40px;}
  .topbar{background:var(--card);border-bottom:1px solid var(--line);padding:14px 18px;position:sticky;top:0;z-index:30;}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .logo{font-weight:800;font-size:19px;letter-spacing:-.5px;color:var(--ocasa-ink);}
  .brand .logo span{color:var(--ocasa-cyan);}
  .brand .sub{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;border-left:1px solid var(--line);padding-left:10px;}
  .lang{display:flex;gap:2px;background:var(--bg);border-radius:9px;padding:3px;}
  .lang button{border:0;background:transparent;font-size:12px;font-weight:700;color:var(--muted);padding:5px 9px;border-radius:7px;cursor:pointer;font-family:inherit;}
  .lang button.on{background:var(--card);color:var(--ocasa-blue);box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .agentbar{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:12.5px;color:var(--muted);}
  .agentbar .who{color:var(--text);font-weight:700;}
  .agentbar .dot{width:7px;height:7px;border-radius:50%;background:#28c76f;flex:none;}
  .head{padding:20px 18px 4px;}
  .head h1{font-size:23px;font-weight:800;letter-spacing:-.6px;}
  .head .sub2{color:var(--muted);font-size:13px;margin-top:3px;font-weight:500;}

  .filterbar{display:flex;gap:10px;padding:14px 18px 4px;}
  .fpill{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;min-width:0;}
  .fpill .ico{width:32px;height:32px;border-radius:10px;background:var(--ocasa-cyan-soft);display:grid;place-items:center;flex:none;}
  .fpill .ico svg{width:16px;height:16px;stroke:var(--refri);}
  .fpill .meta{min-width:0;flex:1;}
  .fpill .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;}
  .fpill select{border:0;background:transparent;font-family:inherit;font-size:14px;font-weight:800;color:var(--text);width:100%;padding:2px 0 0;cursor:pointer;-webkit-appearance:none;appearance:none;letter-spacing:-.3px;}
  .fpill select:focus{outline:none;}
  .fpill .chev{color:var(--muted);flex:none;}

  .summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 18px 4px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);}
  .stat .n{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1;}
  .stat .l{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600;margin-top:6px;}
  .stat.accent .n{color:var(--ocasa-cyan);}
  .search{padding:12px 18px 6px;}
  .search input{width:100%;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:12px 14px;font-size:14.5px;font-family:inherit;color:var(--text);box-shadow:var(--shadow);}
  .search input:focus{outline:none;border-color:var(--ocasa-cyan);}
  .groups{padding:8px 14px 0;}
  .group{margin-bottom:14px;}
  .group-head{display:flex;align-items:center;justify-content:space-between;padding:10px 8px;cursor:pointer;}
  .group-head .left{display:flex;align-items:center;gap:10px;}
  .group-head .pin{width:30px;height:30px;border-radius:9px;background:var(--ocasa-cyan-soft);display:grid;place-items:center;flex:none;}
  .group-head .pin svg{width:16px;height:16px;stroke:var(--refri);}
  .group-head .loc{font-size:15.5px;font-weight:800;letter-spacing:-.3px;}
  .group-head .count{font-size:12px;color:var(--muted);font-weight:600;}
  .group-head .chev{transition:transform .2s;color:var(--muted);}
  .group.collapsed .chev{transform:rotate(-90deg);}
  .group.collapsed .cards{display:none;}
  .cards{display:flex;flex-direction:column;gap:9px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s;}
  .card:active{transform:scale(.985);}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .card .doc{font-size:14.5px;font-weight:800;letter-spacing:-.3px;font-variant-numeric:tabular-nums;}
  .card .rem{font-size:13px;color:var(--text);margin-top:3px;font-weight:600;}
  .card .addr{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .badge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:5px 9px;border-radius:7px;white-space:nowrap;flex:none;}
  .badge.CONGELADO{background:var(--frozen-bg);color:var(--frozen);}
  .badge.REFRIGERADO{background:var(--refri-bg);color:var(--refri);}
  .card-bot{display:flex;align-items:center;gap:14px;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);}
  .chip{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);font-weight:600;}
  .chip svg{width:13px;height:13px;stroke:var(--muted);flex:none;}
  .chip.time{color:var(--ocasa-blue);}
  .chip.time svg{stroke:var(--ocasa-blue);}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px;}
  .scrim{position:fixed;inset:0;background:rgba(26,39,64,.45);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40;}
  .scrim.on{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:22px 22px 0 0;z-index:50;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);max-height:88vh;overflow-y:auto;padding-bottom:28px;}
  .sheet.on{transform:translateY(0);}
  .sheet-grip{width:40px;height:4px;background:var(--line);border-radius:3px;margin:10px auto 4px;}
  .sheet-head{padding:8px 20px 16px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .sheet-head .doc{font-size:19px;font-weight:800;letter-spacing:-.5px;}
  .sheet-head .iata{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px;}
  .sheet-close{border:0;background:var(--bg);width:32px;height:32px;border-radius:50%;font-size:18px;color:var(--muted);cursor:pointer;flex:none;line-height:1;}
  .sheet-body{padding:6px 20px;}
  .field{padding:14px 0;border-bottom:1px solid var(--line);}
  .field:last-child{border-bottom:0;}
  .field .k{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:4px;}
  .field .v{font-size:14.5px;color:var(--text);font-weight:500;}
  .field .v.big{font-size:16px;font-weight:700;}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
  @media (min-width:560px){ .summary{grid-template-columns:repeat(4,1fr);} body{max-width:620px;margin:0 auto;box-shadow:0 0 60px rgba(0,0,0,.05);} .sheet{max-width:620px;margin:0 auto;} }
</style>
</head>

let lang="es", query="";

function t(k){ return I18N[lang][k] || k; }
function applyI18n(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent=t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>{ el.placeholder=t(el.dataset.i18nPh); });
  document.documentElement.lang=lang;
}
function setLang(l){
  lang=l;
  document.getElementById("es").classList.toggle("on",l==="es");
  document.getElementById("en").classList.toggle("on",l==="en");
  buildFilters(); applyI18n(); render();
}

function uniqueDates(){
  return [...new Set(RETIROS.map(r=>r.fecha))].filter(Boolean).sort((a,b)=>{
    const pa=a.split("/").reverse().join(""), pb=b.split("/").reverse().join(""); return pa<pb?-1:1;
  });
}
function buildFilters(){
  const ds=document.getElementById("dateSel"), dv=ds.value;
  let dh='<option value="">'+t("allDates")+'</option>';
  uniqueDates().forEach(d=>{ dh+='<option value="'+d+'"'+(d===dv?' selected':'')+'>'+d+'</option>'; });
  ds.innerHTML=dh;
  const ss=document.getElementById("slotSel"), sv=ss.value;
  let sh='<option value="">'+t("allSlots")+'</option>';
  ["manana","mediodia","tarde"].forEach(s=>{ sh+='<option value="'+s+'"'+(s===sv?' selected':'')+'>'+t(s)+'</option>'; });
  ss.innerHTML=sh;
}

function curDate(){ return document.getElementById("dateSel").value; }
function curSlot(){ return document.getElementById("slotSel").value; }
function passFilters(r){
  if(curDate() && r.fecha!==curDate()) return false;
  if(curSlot() && r.bloque!==curSlot()) return false;
  if(query){ const s=(r.doc+" "+r.remitente+" "+r.direccion+" "+r.localidad).toLowerCase(); if(!s.includes(query.toLowerCase())) return false; }
  return true;
}

function stats(list){
  const locs=new Set(list.map(r=>r.localidad));
  document.getElementById("stTotal").textContent=list.length;
  document.getElementById("stLoc").textContent=locs.size;
  document.getElementById("stFro").textContent=list.filter(r=>r.servicio==="CONGELADO").length;
  document.getElementById("stRef").textContent=list.filter(r=>r.servicio==="REFRIGERADO").length;
}

  if(filtered.length===0){ root.innerHTML='<div class="empty">'+t("empty")+'</div>'; return; }
  const byLoc={};
  filtered.forEach(r=>{ (byLoc[r.localidad]=byLoc[r.localidad]||[]).push(r); });
  const locNames=Object.keys(byLoc).sort();
  let html="";
  locNames.forEach((loc,idx)=>{
    const items=byLoc[loc].sort((a,b)=>a.desde<b.desde?-1:1);
    const cntLabel=items.length+" "+(items.length===1?t("retiro"):t("retiros"));
    html+='<div class="group" data-loc="'+idx+'">';
    html+='<div class="group-head" onclick="toggleGroup('+idx+')">';
    html+='<div class="left"><div class="pin">'+icons.pin+'</div><div><div class="loc">'+loc+'</div><div class="count">'+cntLabel+'</div></div></div>';
    html+='<div class="chev">'+icons.chev+'</div></div>';
    html+='<div class="cards">';
    items.forEach(r=>{
      const i=RETIROS.indexOf(r);
      html+='<div class="card" onclick="openSheet('+i+')">';
      html+='<div class="card-top"><div><div class="doc">'+r.doc+'</div><div class="rem">'+r.remitente+'</div><div class="addr">'+r.direccion+'</div></div>';
      html+='<span class="badge '+r.servicio+'">'+t(r.servicio)+'</span></div>';
      html+='<div class="card-bot"><span class="chip time">'+icons.clock+r.desde+' – '+r.hasta+'</span>';
      html+='<span class="chip">'+icons.plane+r.iata+'</span></div>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  root.innerHTML=html;
}

function toggleGroup(idx){ document.querySelector('.group[data-loc="'+idx+'"]').classList.toggle("collapsed"); }
function field(k,v,big){ if(!v) return ""; return '<div class="field"><div class="k">'+k+'</div><div class="v'+(big?" big":"")+'">'+v+'</div></div>'; }

function openSheet(i){
  const r=RETIROS[i];
  document.getElementById("shDoc").textContent=r.doc;
  document.getElementById("shIata").textContent=t("fIata")+": "+r.iata;
  let b="";
  b+='<div class="field"><div class="k">'+t("fService")+'</div><div class="v"><span class="badge '+r.servicio+'">'+t(r.servicio)+'</span></div></div>';
  b+=field(t("fWindow"), r.desde+" – "+r.hasta, true);
  b+=field(t("fSender"), r.remitente, true);
  b+=field(t("fAddress"), r.direccion);
  b+='<div class="twocol">'+field(t("fDistrict"), r.distrito)+field(t("fCP"), r.cp)+'</div>';
  b+='<div class="twocol">'+field(t("fPhone"), r.tel)+field(t("fRequester"), r.pedido)+'</div>';
  b+=field(t("fEquip"), r.equipo);
  document.getElementById("shBody").innerHTML=b;
  document.getElementById("scrim").classList.add("on");
  document.getElementById("sheet").classList.add("on");
}
function closeSheet(){ document.getElementById("scrim").classList.remove("on"); document.getElementById("sheet").classList.remove("on"); }

document.getElementById("q").addEventListener("input", e=>{ query=e.target.value; render(); });

buildFilters(); applyI18n(); render();
</script>
</body>
</html>
