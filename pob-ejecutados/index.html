<style>
  :root {
    --ocasa-ink:#1a2740; --ocasa-blue:#2563a8; --ocasa-cyan:#19b9c4; --ocasa-cyan-soft:#e6f7f8;
    --bg:#f4f6f9; --card:#fff; --line:#e4e9f0; --text:#1a2740; --muted:#6b7a90;
    --pend:#d98324; --pend-bg:#fdf1e3; --reti:#1f9d57; --reti-bg:#e6f6ec;
    --fin:#5b6b8c; --fin-bg:#eef1f6; --canc:#c0392b; --canc-bg:#fbecea;
    --frozen:#3b6fd4; --frozen-bg:#eaf0fc; --refri:#14a7b3; --refri-bg:#e3f6f7; --amb:#8a6d3b; --amb-bg:#f6efe3;
    --shadow:0 1px 3px rgba(26,39,64,.06),0 4px 16px rgba(26,39,64,.04); --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  body{padding-bottom:40px;}
  .topbar{background:var(--card);border-bottom:1px solid var(--line);padding:14px 18px;position:sticky;top:0;z-index:30;}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .logo{font-weight:800;font-size:19px;letter-spacing:-.5px;color:var(--ocasa-ink);}
  .brand .logo span{color:var(--ocasa-cyan);}
  .brand .sub{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;border-left:1px solid var(--line);padding-left:10px;}
  .lang{display:flex;gap:2px;background:var(--bg);border-radius:9px;padding:3px;}
  .lang button{border:0;background:transparent;font-size:12px;font-weight:700;color:var(--muted);padding:5px 9px;border-radius:7px;cursor:pointer;font-family:inherit;}
  .lang button.on{background:var(--card);color:var(--ocasa-blue);box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .agentbar{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:12.5px;color:var(--muted);}
  .agentbar .who{color:var(--text);font-weight:700;}
  .agentbar .dot{width:7px;height:7px;border-radius:50%;background:#28c76f;flex:none;}
  .head{padding:20px 18px 8px;}
  .head h1{font-size:23px;font-weight:800;letter-spacing:-.6px;}
  .head .date{color:var(--muted);font-size:13px;margin-top:3px;font-weight:500;}
  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 18px 4px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 10px;box-shadow:var(--shadow);cursor:pointer;transition:border-color .15s,transform .1s;text-align:center;}
  .stat:active{transform:scale(.97);}
  .stat.on{border-color:var(--ocasa-cyan);box-shadow:0 0 0 2px var(--ocasa-cyan-soft);}
  .stat .n{font-size:24px;font-weight:800;letter-spacing:-1px;line-height:1;}
  .stat .l{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;margin-top:6px;}
  .stat.total .n{color:var(--ocasa-cyan);}
  .stat.pend .n{color:var(--pend);} .stat.reti .n{color:var(--reti);} .stat.canc .n{color:var(--canc);}
  .search{padding:12px 18px 6px;}
  .search input{width:100%;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:12px 14px;font-size:14.5px;font-family:inherit;color:var(--text);box-shadow:var(--shadow);}
  .search input:focus{outline:none;border-color:var(--ocasa-cyan);}
  .list{padding:8px 14px 0;display:flex;flex-direction:column;gap:9px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s;}
  .card:active{transform:scale(.985);}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .card .doc{font-size:14.5px;font-weight:800;letter-spacing:-.3px;font-variant-numeric:tabular-nums;}
  .card .cli{font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:600;}
  .stbadge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:5px 9px;border-radius:7px;white-space:nowrap;flex:none;display:flex;align-items:center;gap:5px;}
  .stbadge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;}
  .stbadge.pendiente{background:var(--pend-bg);color:var(--pend);}
  .stbadge.retirado{background:var(--reti-bg);color:var(--reti);}
  .stbadge.finalizado{background:var(--fin-bg);color:var(--fin);}
  .stbadge.cancelado{background:var(--canc-bg);color:var(--canc);}
  .route{display:flex;align-items:center;gap:8px;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);font-size:12.5px;}
  .route .city{font-weight:700;color:var(--text);}
  .route .arrow{color:var(--muted);flex:none;}
  .route .svc{margin-left:auto;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:4px 8px;border-radius:6px;}
  .svc.CONGELADO{background:var(--frozen-bg);color:var(--frozen);} .svc.REFRIGERADO{background:var(--refri-bg);color:var(--refri);}
  .svc.AMBIENTE{background:var(--amb-bg);color:var(--amb);} .svc.OTRO{background:var(--fin-bg);color:var(--fin);}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px;}
  .scrim{position:fixed;inset:0;background:rgba(26,39,64,.45);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40;}
  .scrim.on{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:22px 22px 0 0;z-index:50;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);max-height:88vh;overflow-y:auto;padding-bottom:28px;}
  .sheet.on{transform:translateY(0);}
  .sheet-grip{width:40px;height:4px;background:var(--line);border-radius:3px;margin:10px auto 4px;}
  .sheet-head{padding:8px 20px 16px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .sheet-head .doc{font-size:19px;font-weight:800;letter-spacing:-.5px;}
  .sheet-head .sub{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px;}
  .sheet-close{border:0;background:var(--bg);width:32px;height:32px;border-radius:50%;font-size:18px;color:var(--muted);cursor:pointer;flex:none;line-height:1;}
  .sheet-body{padding:6px 20px;}
  .field{padding:14px 0;border-bottom:1px solid var(--line);}
  .field:last-child{border-bottom:0;}
  .field .k{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:4px;}
  .field .v{font-size:14.5px;color:var(--text);font-weight:500;}
  .field .v.big{font-size:16px;font-weight:700;}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
  @media (min-width:560px){ body{max-width:620px;margin:0 auto;box-shadow:0 0 60px rgba(0,0,0,.05);} .sheet{max-width:620px;margin:0 auto;} }
</style>

let lang="es",query="",filter="all";
function t(k){return I18N[lang][k]||k;}
function applyI18n(){document.querySelectorAll("[data-i18n]").forEach(e=>e.textContent=t(e.dataset.i18n));document.querySelectorAll("[data-i18n-ph]").forEach(e=>e.placeholder=t(e.dataset.i18nPh));document.documentElement.lang=lang;}
function setLang(l){lang=l;document.getElementById("es").classList.toggle("on",l==="es");document.getElementById("en").classList.toggle("on",l==="en");applyI18n();render();}
function stats(){
 document.getElementById("stTotal").textContent=POB.length;
 document.getElementById("stPend").textContent=POB.filter(r=>r.cat==="pendiente").length;
 document.getElementById("stReti").textContent=POB.filter(r=>r.cat==="retirado"||r.cat==="finalizado").length;
 document.getElementById("stCanc").textContent=POB.filter(r=>r.cat==="cancelado").length;
}
function setFilter(f,el){filter=f;document.querySelectorAll(".stat").forEach(s=>s.classList.remove("on"));el.classList.add("on");render();}
function matchF(r){ if(filter==="all")return true; if(filter==="retirado")return r.cat==="retirado"||r.cat==="finalizado"; return r.cat===filter; }
function matchQ(r){ if(!query)return true; const s=(r.doc+" "+r.cliente+" "+r.origen+" "+r.destino+" "+r.equipo).toLowerCase(); return s.includes(query.toLowerCase()); }
const ic={arrow:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>'};
function render(){
 const root=document.getElementById("list");
 const f=POB.filter(r=>matchF(r)&&matchQ(r));
 if(!f.length){root.innerHTML='<div class="empty">'+t("empty")+'</div>';return;}
 let h="";
 f.forEach(r=>{
  const i=POB.indexOf(r);
  const dest=r.destino?r.destino:"—";
  h+='<div class="card" onclick="openSheet('+i+')">';
  h+='<div class="card-top"><div><div class="doc">'+r.doc+'</div><div class="cli">'+r.cliente+'</div></div>';
  h+='<span class="stbadge '+r.cat+'">'+t(r.cat)+'</span></div>';
  h+='<div class="route"><span class="city">'+(r.origen||"—")+'</span>';
  if(r.destino){h+='<span class="arrow">'+ic.arrow+'</span><span class="city">'+r.destino+'</span>';}
  h+='<span class="svc '+r.servicio+'">'+t(r.servicio)+'</span></div>';
  h+='</div>';
 });
 root.innerHTML=h;
}
function field(k,v,big){if(!v)return"";return'<div class="field"><div class="k">'+k+'</div><div class="v'+(big?" big":"")+'">'+v+'</div></div>';}
function openSheet(i){
 const r=POB[i];
 document.getElementById("shDoc").textContent=r.doc;
 document.getElementById("shSub").textContent=r.cliente;
 let b='<div class="field"><div class="k">'+t("fStatus")+'</div><div class="v"><span class="stbadge '+r.cat+'">'+t(r.cat)+' · '+r.estDesc+'</span></div></div>';
 b+='<div class="twocol">'+field(t("fOrigin"),r.origen)+field(t("fDest"),r.destino)+'</div>';
 b+=field(t("fConsignee"),r.destinatario);
 b+='<div class="field"><div class="k">'+t("fService")+'</div><div class="v"><span class="svc '+r.servicio+'">'+t(r.servicio)+'</span></div></div>';
 b+='<div class="twocol">'+field(t("fPickup"),r.fpickup)+field(t("fMov"),(r.fmov?r.fmov+(r.hmov?" "+r.hmov:""):""))+'</div>';
 b+=field(t("fEquip"),r.equipo);
 b+='<div class="twocol">'+field(t("fAP"),r.ap)+field(t("fSol"),r.sol)+'</div>';
 document.getElementById("shBody").innerHTML=b;
 document.getElementById("scrim").classList.add("on");
 document.getElementById("sheet").classList.add("on");
}
function closeSheet(){document.getElementById("scrim").classList.remove("on");document.getElementById("sheet").classList.remove("on");}
